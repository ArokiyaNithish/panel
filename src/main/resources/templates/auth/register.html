<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register — Campus Recruitment Portal</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card fade-up" style="max-width:520px">

    <div class="auth-logo">
      <div class="icon">🎓</div>
      <div class="auth-logo-text">Campus Recruit<small>Create your account</small></div>
    </div>

    <h1 class="auth-title">Join the Portal</h1>
    <p class="auth-subtitle">Register as a Student or Employer</p>

    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form th:action="@{/auth/register}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label">I am a…</label>
        <div style="display:flex;gap:10px;">
          <label style="flex:1;cursor:pointer;">
            <input type="radio" name="role" value="STUDENT" id="roleStudent" style="display:none" checked/>
            <div class="role-btn" id="role-btn-student"
                 style="padding:12px;border:2px solid var(--primary);border-radius:10px;text-align:center;background:rgba(108,99,255,0.1);">
              🎓<br><strong>Student</strong><br>
              <small style="color:var(--text-muted);font-size:11px;">Browse & apply for jobs</small>
            </div>
          </label>
          <label style="flex:1;cursor:pointer;">
            <input type="radio" name="role" value="EMPLOYER" id="roleEmployer" style="display:none"/>
            <div class="role-btn" id="role-btn-employer"
                 style="padding:12px;border:2px solid var(--border);border-radius:10px;text-align:center;">
              🏢<br><strong>Employer</strong><br>
              <small style="color:var(--text-muted);font-size:11px;">Post jobs &amp; hire talent</small>
            </div>
          </label>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <input id="fullName" type="text" name="fullName" class="form-control"
                 placeholder="John Doe" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Phone</label>
          <input id="phone" type="tel" name="phone" class="form-control" placeholder="+91 9000000000"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="regEmail">Email Address</label>
        <input id="regEmail" type="email" name="email" class="form-control"
               placeholder="you@university.edu" required/>
      </div>

      <div class="form-group">
        <label class="form-label" for="regPassword">Password</label>
        <input id="regPassword" type="password" name="password" class="form-control"
               placeholder="Min. 6 characters" required minlength="6"/>
      </div>

      <div id="employer-note" class="alert alert-warn" style="display:none">
        ⚠️ Employer accounts require admin approval before you can post jobs.
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
        Create Account →
      </button>
    </form>

    <div class="auth-footer">
      Already registered? <a th:href="@{/auth/login}">Sign in here</a>
    </div>
  </div>
</div>
<script>
  const student = document.getElementById('roleStudent');
  const employer = document.getElementById('roleEmployer');
  const btnS = document.getElementById('role-btn-student');
  const btnE = document.getElementById('role-btn-employer');
  const note = document.getElementById('employer-note');
  function updateRole() {
    if (employer.checked) {
      btnE.style.borderColor = 'var(--primary)'; btnE.style.background = 'rgba(108,99,255,0.1)';
      btnS.style.borderColor = 'var(--border)'; btnS.style.background = '';
      note.style.display = 'flex';
    } else {
      btnS.style.borderColor = 'var(--primary)'; btnS.style.background = 'rgba(108,99,255,0.1)';
      btnE.style.borderColor = 'var(--border)'; btnE.style.background = '';
      note.style.display = 'none';
    }
  }
  student.addEventListener('change', updateRole);
  employer.addEventListener('change', updateRole);
  document.querySelectorAll('.role-btn').forEach(b => b.addEventListener('click', () => {
    setTimeout(updateRole, 10);
  }));
</script>
</body>
</html>
