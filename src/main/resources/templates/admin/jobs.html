<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main}, 'All Jobs', 'Monitor all job postings on the platform', ${admin}, 'jobs')}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Admin — All Jobs</title></head>
<body>
<main>
<div class="card fade-up">
  <div class="card-header">
    <div>
      <div class="card-title">💼 All Job Postings</div>
      <div class="card-subtitle" th:text="${jobs.size()} + ' total jobs on platform'"></div>
    </div>
  </div>
  <div class="empty-state" th:if="${jobs.empty}">
    <div class="icon">📭</div>
    <p>No jobs have been posted yet.</p>
  </div>
  <div class="table-wrap" th:if="${!jobs.empty}">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Job Title</th>
          <th>Employer</th>
          <th>Location</th>
          <th>Applicants</th>
          <th>Posted</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="job,i : ${jobs}">
          <td style="color:var(--text-muted);font-size:12px;" th:text="${i.count}"></td>
          <td>
            <div style="font-weight:600;" th:text="${job.title}">Title</div>
            <div style="font-size:12px;color:var(--text-muted);" th:text="${job.category}"></div>
          </td>
          <td>
            <div style="font-size:13px;" th:text="${job.employer.fullName}">Employer</div>
            <div style="font-size:11px;color:var(--text-muted);" th:text="${job.employer.email}"></div>
          </td>
          <td style="font-size:13px;" th:text="${job.location ?: '—'}"></td>
          <td>
            <span style="font-weight:700;color:var(--primary);" th:text="${job.applications.size()}">0</span>
          </td>
          <td style="font-size:12px;" th:text="${#temporals.format(job.postedAt,'dd MMM yyyy')}"></td>
          <td>
            <span class="badge"
                  th:classappend="${job.status.name() == 'ACTIVE'} ? 'badge-active' :
                                  (${job.status.name() == 'CLOSED'} ? 'badge-closed' : 'badge-draft')"
                  th:text="${job.status.name()}">Status</span>
          </td>
          <td>
            <form th:action="@{'/admin/jobs/' + ${job.id} + '/delete'}" method="post" style="margin:0"
                  onsubmit="return confirm('Remove this job posting?')">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button class="btn btn-danger btn-xs" type="submit">🗑 Remove</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</main>
</body>
</html>
