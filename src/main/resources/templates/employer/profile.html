<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main}, 'Company Profile', 'Manage your company details', ${employer}, 'profile')}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Company Profile</title></head>
<body>
<main>
<div style="max-width:800px;margin:0 auto;">
  <div class="card fade-up">
    <div class="card-header">
      <div>
        <div class="card-title">🏢 Company Profile</div>
        <div class="card-subtitle">Information here will be visible to students on job postings</div>
      </div>
    </div>

    <form th:action="@{/employer/profile}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label">Company Name *</label>
        <input type="text" name="companyName" class="form-control" th:value="${profile.companyName ?: employer.fullName}" required/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Website URL</label>
          <input type="url" name="website" class="form-control" th:value="${profile.website}" placeholder="https://example.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Industry</label>
          <input type="text" name="industry" class="form-control" th:value="${profile.industry}" placeholder="IT, Finance, Design..."/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Company Description</label>
        <textarea name="description" class="form-control" rows="5" th:text="${profile.description}" placeholder="Tell students about your company culture and mission..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Office Address</label>
        <input type="text" name="address" class="form-control" th:value="${profile.address}" placeholder="City, State, Country"/>
      </div>

      <div style="margin-top:20px;">
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
          💾 Save Profile Changes
        </button>
      </div>
    </form>
  </div>
</div>
</main>
</body>
</html>
