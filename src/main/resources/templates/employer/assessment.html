<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main}, 'Manage Assessment', 'Configure 5 screening questions', ${employer}, 'jobs')}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Manage Assessment</title></head>
<body>
<main>
<div class="card fade-up">
    <div class="card-header" style="display:flex; justify-content:space-between;">
        <div class="card-title">📝 Assessment Questions for: <span th:text="${job.title}" style="color:var(--primary);"></span></div>
        <a th:href="@{/employer/jobs/{id}/applicants(id=${job.id})}" class="btn btn-outline">Back to Applicants</a>
    </div>
    <div style="padding:20px;">
        <p style="color:var(--text-muted); margin-bottom:20px;">Add exactly 5 questions. Shortlisted students will need to take this assessment. If they score 3 or higher, they will automatically be moved to INTERVIEW_SCHEDULED.</p>

        <form th:action="@{/employer/jobs/{id}/assessment(id=${job.id})}" method="post">
            <div th:each="i : ${#numbers.sequence(0, 4)}" style="border:1px solid #eee; padding:15px; border-radius:8px; margin-bottom:15px; background:#fafafa;">
                <h4 style="margin-top:0; color:#444;">Question [[${i+1}]]</h4>
                
                <div class="form-group">
                    <label class="form-label">Question Text</label>
                    <input type="text" name="questionText" class="form-control" required 
                           th:value="${questions.size() > i ? questions[i].questionText : ''}" placeholder="Enter question..."/>
                </div>
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div class="form-group">
                        <label class="form-label">Option A</label>
                        <input type="text" name="optionA" class="form-control" required th:value="${questions.size() > i ? questions[i].optionA : ''}"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Option B</label>
                        <input type="text" name="optionB" class="form-control" required th:value="${questions.size() > i ? questions[i].optionB : ''}"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Option C</label>
                        <input type="text" name="optionC" class="form-control" required th:value="${questions.size() > i ? questions[i].optionC : ''}"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Option D</label>
                        <input type="text" name="optionD" class="form-control" required th:value="${questions.size() > i ? questions[i].optionD : ''}"/>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Correct Option</label>
                    <select name="correctOption" class="input" required>
                        <option value="A" th:selected="${questions.size() > i and questions[i].correctOption == 'A'}">Option A</option>
                        <option value="B" th:selected="${questions.size() > i and questions[i].correctOption == 'B'}">Option B</option>
                        <option value="C" th:selected="${questions.size() > i and questions[i].correctOption == 'C'}">Option C</option>
                        <option value="D" th:selected="${questions.size() > i and questions[i].correctOption == 'D'}">Option D</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top:10px;">Save Assessment</button>
        </form>
    </div>
</div>
</main>
</body>
</html>
