<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main},
      ${job.id != null ? 'Edit Job' : 'Post New Job'},
      ${job.id != null ? 'Update your job listing' : 'Create a job posting'},
      ${employer}, 'jobs')}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Job Form</title></head>
<body>
<main>
<div style="max-width:800px;margin:0 auto;">
  <div class="card fade-up">
    <div class="card-header">
      <div>
        <div class="card-title" th:text="${job.id != null ? '✏️ Edit Job' : '📝 Post New Job'}">Post Job</div>
        <div class="card-subtitle">Fill in the details below — students will see this listing</div>
      </div>
      <a th:href="@{/employer/jobs}" class="btn btn-outline btn-sm">← Back</a>
    </div>

    <form th:action="@{/employer/jobs/save}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="jobId" th:value="${job.id}"/>

      <!-- Basic Info -->
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px;">Basic Information</div>
      <div class="form-group">
        <label class="form-label">Job Title *</label>
        <input type="text" name="title" class="form-control" th:value="${job.title}"
               placeholder="e.g. Software Engineer Intern" required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select name="category" class="form-control">
            <option value="">Select category</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat}" th:text="${cat}" th:selected="${job.category == cat}"></option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input type="text" name="location" class="form-control" th:value="${job.location}" placeholder="Chennai / Remote / Hybrid"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Experience Level</label>
          <select name="experienceLevel" class="form-control">
            <option value="">Select level</option>
            <option th:each="lv : ${experienceLevels}"
                    th:value="${lv}" th:text="${lv}" th:selected="${job.experienceLevel == lv}"></option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Salary / Package</label>
          <input type="text" name="salaryRange" class="form-control" th:value="${job.salaryRange}" placeholder="e.g. ₹6-8 LPA"/>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Requirements -->
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px;">Requirements & Eligibility</div>
      <div class="form-group">
        <label class="form-label">Job Description *</label>
        <textarea name="description" class="form-control" rows="6"
                  placeholder="Describe the role, responsibilities, and what a typical day looks like…"
                  required th:text="${job.description}"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Required Skills (comma-separated)</label>
        <input type="text" name="skillsRequired" class="form-control" th:value="${job.skillsRequired}"
               placeholder="Java, Spring Boot, MySQL, REST APIs"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Number of Openings</label>
          <input type="number" name="openings" class="form-control" th:value="${job.openings}" min="1" placeholder="5"/>
        </div>
        <div class="form-group">
          <label class="form-label">Minimum CGPA</label>
          <input type="number" name="minCgpa" class="form-control" step="0.1" min="0" max="10" th:value="${job.minCgpa}" placeholder="7.0"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Eligible Departments</label>
          <input type="text" name="eligibleDepartments" class="form-control" th:value="${job.eligibleDepartments}"
                 placeholder="CSE, IT, ECE (or All)"/>
        </div>
        <div class="form-group">
          <label class="form-label">Application Deadline</label>
          <input type="date" name="deadline" class="form-control"
                 th:value="${job.deadline != null ? #temporals.format(job.deadline,'yyyy-MM-dd') : ''}"/>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Status -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Posting Status</label>
          <select name="status" class="form-control">
            <option value="ACTIVE" th:selected="${job.status == null or job.status?.name() == 'ACTIVE'}">Active — Visible to students</option>
            <option value="DRAFT" th:selected="${job.status?.name() == 'DRAFT'}">Draft — Save for later</option>
            <option value="CLOSED" th:selected="${job.status?.name() == 'CLOSED'}">Closed</option>
          </select>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:8px;">
        <button type="submit" class="btn btn-primary" style="flex:1;justify-content:center;padding:12px;">
          💾 <span th:text="${job.id != null ? 'Save Changes' : 'Post Job'}">Post Job</span>
        </button>
        <a th:href="@{/employer/jobs}" class="btn btn-outline" style="padding:12px 20px;">Cancel</a>
      </div>
    </form>
  </div>
</div>
</main>
</body>
</html>
