<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main}, 'User Management', 'All registered users', ${admin}, 'users')}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>Users</title></head>
<body>
<main>
<!-- Filter Tabs -->
<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;" class="fade-up">
  <a th:href="@{/admin/users}"
     class="btn" th:classappend="${selectedRole == 'ALL'} ? 'btn-primary' : 'btn-outline'">All Users</a>
  <a th:href="@{/admin/users(role='STUDENT')}"
     class="btn" th:classappend="${selectedRole == 'STUDENT'} ? 'btn-primary' : 'btn-outline'">🎓 Students</a>
  <a th:href="@{/admin/users(role='EMPLOYER')}"
     class="btn" th:classappend="${selectedRole == 'EMPLOYER'} ? 'btn-primary' : 'btn-outline'">🏢 Employers</a>
</div>

<div class="card fade-up fade-up-1">
  <div class="card-header">
    <div class="card-title">👥 Users
      <span style="color:var(--text-muted);font-weight:400;font-size:14px;" th:text="'(' + ${users.size()} + ')'"></span>
    </div>
  </div>
  <div class="empty-state" th:if="${users.empty}">
    <div class="icon">👤</div>
    <p>No users found.</p>
  </div>
  <div class="table-wrap" th:if="${!users.empty}">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Registered</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="user,i : ${users}">
          <td style="color:var(--text-muted);font-size:12px;" th:text="${i.count}"></td>
          <td>
            <div style="font-weight:600;" th:text="${user.fullName}">Name</div>
          </td>
          <td style="font-size:13px;" th:text="${user.email}">Email</td>
          <td>
            <span class="badge"
                  th:classappend="${user.role.name() == 'STUDENT'} ? 'badge-review' :
                                  (${user.role.name() == 'EMPLOYER'} ? 'badge-shortlisted' : 'badge-selected')"
                  th:text="${user.role.name()}">Role</span>
          </td>
          <td style="font-size:13px;" th:text="${user.phone ?: '—'}"></td>
          <td>
            <span class="badge"
                  th:classappend="${user.enabled} ? 'badge-active' : 'badge-rejected'"
                  th:text="${user.enabled ? 'Active' : 'Disabled'}">Status</span>
          </td>
          <td style="font-size:12px;" th:text="${#temporals.format(user.createdAt,'dd MMM yyyy')}"></td>
          <td>
            <div style="display:flex;gap:5px;flex-wrap:wrap;">
              <!-- Approve (for disabled employers) -->
              <form th:if="${!user.enabled and user.role.name() == 'EMPLOYER'}"
                    th:action="@{'/admin/users/' + ${user.id} + '/approve'}" method="post" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-success btn-xs">✅ Approve</button>
              </form>
              <!-- Disable active -->
              <form th:if="${user.enabled}"
                    th:action="@{'/admin/users/' + ${user.id} + '/reject'}" method="post" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-warn btn-xs" type="submit">⊘ Disable</button>
              </form>
              <!-- Delete -->
              <form th:action="@{'/admin/users/' + ${user.id} + '/delete'}" method="post" style="margin:0"
                    onsubmit="return confirm('Delete this user permanently?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-danger btn-xs" type="submit">🗑</button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</main>
</body>
</html>
