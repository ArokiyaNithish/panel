<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main}, 'My Job Postings', 'Manage all your job listings', ${employer}, 'jobs')}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>My Jobs</title></head>
<body>
<main>
<div class="card-header" style="margin-bottom:20px;padding-bottom:0;border:none;">
  <div></div>
  <a th:href="@{/employer/jobs/new}" class="btn btn-primary">+ Post New Job</a>
</div>

<div th:if="${jobs.empty}" class="empty-state card">
  <div class="icon">📝</div>
  <p>No jobs posted yet. <a th:href="@{/employer/jobs/new}">Post your first job →</a></p>
</div>

<div class="card fade-up" th:if="${!jobs.empty}">
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Job Title</th><th>Location</th><th>Applicants</th><th>Openings</th><th>Posted</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <tr th:each="job : ${jobs}">
          <td>
            <div style="font-weight:600;" th:text="${job.title}">Title</div>
            <div style="font-size:12px;color:var(--text-muted);" th:text="${job.category}"></div>
          </td>
          <td style="font-size:13px;" th:text="${job.location ?: '—'}"></td>
          <td>
            <a th:href="@{'/employer/jobs/' + ${job.id} + '/applicants'}"
               style="font-weight:700;color:var(--primary);" th:text="${job.applications.size()}">0</a>
          </td>
          <td th:text="${job.openings ?: '—'}"></td>
          <td style="font-size:12px;" th:text="${#temporals.format(job.postedAt,'dd MMM yyyy')}"></td>
          <td>
            <span class="badge"
                  th:classappend="${job.status.name() == 'ACTIVE'} ? 'badge-active' :
                                  (${job.status.name() == 'CLOSED'} ? 'badge-closed' : 'badge-draft')"
                  th:text="${job.status.name()}">Status</span>
          </td>
          <td>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <a th:href="@{'/employer/jobs/' + ${job.id} + '/applicants'}" class="btn btn-primary btn-xs">Applicants</a>
              <a th:href="@{'/employer/jobs/' + ${job.id} + '/edit'}" class="btn btn-outline btn-xs">Edit</a>
              <form th:action="@{'/employer/jobs/' + ${job.id} + '/close'}" method="post" style="margin:0"
                    th:if="${job.status.name() == 'ACTIVE'}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-warn btn-xs" type="submit">Close</button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</main>
</body>
</html>
