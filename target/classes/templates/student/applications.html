<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::main}, 'My Applications', 'Track your recruitment journey', ${student}, 'applications')}"
      xmlns:th="http://www.thymeleaf.org">
<head><title>My Applications</title></head>
<body>
<main>
<!-- Stats Row -->
<div class="stats-grid fade-up" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-bottom:20px;">
  <div class="stat-card" style="--card-color:#6c63ff;padding:14px;">
    <div class="stat-label">Total</div>
    <div class="stat-value" style="font-size:24px;" th:text="${applications.size()}">0</div>
  </div>
  <div class="stat-card" style="--card-color:#f59e0b;padding:14px;">
    <div class="stat-label">Pending</div>
    <div class="stat-value" style="font-size:24px;"
         th:text="${applications.?[status.name() == 'PENDING'].size()}">0</div>
  </div>
  <div class="stat-card" style="--card-color:#22c55e;padding:14px;">
    <div class="stat-label">Shortlisted</div>
    <div class="stat-value" style="font-size:24px;"
         th:text="${applications.?[status.name() == 'SHORTLISTED'].size()}">0</div>
  </div>
  <div class="stat-card" style="--card-color:#a78bfa;padding:14px;">
    <div class="stat-label">Interviews</div>
    <div class="stat-value" style="font-size:24px;"
         th:text="${applications.?[status.name() == 'INTERVIEW_SCHEDULED'].size()}">0</div>
  </div>
  <div class="stat-card" style="--card-color:#00d4aa;padding:14px;">
    <div class="stat-label">Selected</div>
    <div class="stat-value" style="font-size:24px;"
         th:text="${applications.?[status.name() == 'SELECTED'].size()}">0</div>
  </div>
</div>

<!-- Applications Table -->
<div class="card fade-up fade-up-1">
  <div class="card-header">
    <div class="card-title">📋 All Applications</div>
  </div>
  <div th:if="${applications.empty}" class="empty-state">
    <div class="icon">📭</div>
    <p>No applications yet. <a th:href="@{/student/jobs}">Start browsing jobs →</a></p>
  </div>
  <div class="table-wrap" th:if="${!applications.empty}">
    <table>
      <thead>
        <tr>
          <th>Job Title</th>
          <th>Company</th>
          <th>AI Match</th>
          <th>Status</th>
          <th>Applied On</th>
          <th>Interview</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="app : ${applications}">
          <td>
            <div style="font-weight:600;" th:text="${app.job.title}">Title</div>
            <div style="font-size:12px;color:var(--text-muted);" th:text="${app.job.location}"></div>
          </td>
          <td th:text="${app.job.employer.fullName}">Company</td>
          <td>
            <div th:if="${app.aiMatchScore != null}" style="display:flex;align-items:center;gap:6px;">
              <div class="progress-bar-wrap" style="width:60px;height:5px;">
                <div class="progress-bar" th:style="'width:' + ${app.aiMatchScore} + '%'"></div>
              </div>
              <span style="font-size:12px;font-weight:700;" th:text="${#numbers.formatDecimal(app.aiMatchScore,1,0)} + '%'"></span>
            </div>
            <span th:if="${app.aiMatchScore == null}" style="color:var(--text-muted);font-size:12px;">—</span>
          </td>
          <td>
            <span class="badge"
                  th:classappend="${app.status.name() == 'PENDING'} ? 'badge-pending' :
                                  (${app.status.name() == 'SHORTLISTED'} ? 'badge-shortlisted' :
                                  (${app.status.name() == 'SELECTED'} ? 'badge-selected' :
                                  (${app.status.name() == 'REJECTED'} ? 'badge-rejected' :
                                  (${app.status.name() == 'INTERVIEW_SCHEDULED'} ? 'badge-scheduled' :
                                  (${app.status.name() == 'UNDER_REVIEW'} ? 'badge-review' : 'badge-pending')))))"
                  th:text="${app.status.name().replace('_',' ')}">Status</span>
          </td>
          <td style="font-size:13px;" th:text="${#temporals.format(app.appliedAt,'dd MMM yyyy')}"></td>
          <td>
            <div th:each="iv : ${interviews}" th:if="${iv.application.id == app.id}">
              <div style="font-size:12px;font-weight:600;color:var(--accent);"
                   th:text="${#temporals.format(iv.interviewDate,'dd MMM')} + ' ' + ${iv.slot}"></div>
              <div style="font-size:11px;color:var(--text-muted);" th:text="${iv.venue ?: iv.meetLink}"></div>
            </div>
            
            <a th:if="${app.status.name() == 'SHORTLISTED' and app.assessmentScore == null}" 
               th:href="@{'/student/applications/' + ${app.id} + '/assessment'}" 
               class="btn btn-primary btn-xs" style="margin-top:6px;font-size:11px;padding:4px 8px;">📝 Take Assessment</a>
               
            <div th:if="${app.assessmentScore != null}" style="margin-top:6px; font-size:12px; font-weight:600;">
              Score: <span th:text="${app.assessmentScore} + '/5'" th:style="${app.assessmentScore >= 3 ? 'color:var(--success)' : 'color:var(--danger)'}"></span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Notes from Employer -->
<div th:each="app : ${applications}" th:if="${app.employerNotes != null}">
  <div class="card fade-up" style="border-left:3px solid var(--primary);">
    <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:6px;"
         th:text="${app.job.title} + ' — Employer Note'"></div>
    <div style="font-size:13px;" th:text="${app.employerNotes}"></div>
  </div>
</div>
</main>
</body>
</html>
